      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar (Suppressed as per rules for Success/Confirmation splash screens) -->
<!-- The Shell is suppressed for task-focused/transactional screens to prioritize content canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-lg mx-auto w-full">
<!-- Illustration/Icon Area -->
<div class="relative w-full flex justify-center mb-10">
<!-- Animated-feel background glow -->
<div class="absolute inset-0 bg-secondary/10 blur-[60px] rounded-full scale-75"></div>
<!-- Success Image -->
<div class="relative z-10 w-48 h-48 rounded-full bg-surface-container-lowest shadow-[0_24px_40px_-4px_rgba(5,25,67,0.06)] flex items-center justify-center p-1">
<div class="w-full h-full rounded-full overflow-hidden flex items-center justify-center bg-gradient-to-br from-secondary to-primary-container">
<span class="material-symbols-outlined text-white text-7xl" style="font-variation-settings: 'FILL' 1; font-weight: 200;">check_circle</span>
</div>
</div>
</div>
<!-- Headline & Messaging -->
<div class="text-center space-y-3 mb-12">
<h1 class="font-outfit font-bold text-3xl tracking-tight text-primary">Visit Successfully Logged</h1>
<p class="text-on-surface-variant font-body leading-relaxed max-w-xs mx-auto opacity-80">
                The walkthrough for the Skyline Penthouse has been recorded and updated in the client portfolio.
            </p>
</div>
<!-- Summary Card (Tonal Layering / No Borders) -->
<div class="w-full bg-surface-container-low rounded-[1.5rem] p-6 mb-12 space-y-6">
<div class="flex items-center justify-between">
<div class="space-y-1">
<p class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant/60 font-medium">Property</p>
<p class="font-headline font-bold text-on-surface text-lg">Skyline Penthouse B4</p>
</div>
<div class="w-12 h-12 rounded-xl bg-surface-container-lowest overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Modern luxury penthouse living room with floor to ceiling windows overlooking a city skyline at sunset" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhRR5KbB7myWAHuxQGhhp0o0Rj8dMthqXu6YfBSZ95PGDGW9kagfW5pfkjVZuhFxvQdAaUwJirSMF2LrXBOUdeOYUahxmXAacawq2L_XEGNztbZDNmPTdXbrmH8ADqnpIBDdGPsVVZ_rj16IAw2WSMfN1pTv5mR1tt6AYCi_RwAlJ5wdJfBN3t5rw7f1n8WFg0cSX5oKHf27kcfKQtAJ_p8lUt2f56814fomUoisugsTE1UTIolYdp8Qmp1LanVitajUSThV3LqEUK"/>
</div>
</div>
<div class="flex items-center justify-between pt-4 border-t border-outline-variant/15">
<div class="space-y-1">
<p class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant/60 font-medium">Final Status</p>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<p class="font-body font-semibold text-secondary">Interested</p>
</div>
</div>
<div class="text-right space-y-1">
<p class="font-label text-[10px] uppercase tracking-wider text-on-surface-variant/60 font-medium">Client</p>
<p class="font-body font-medium text-on-surface">Eleanor Pemberton</p>
</div>
</div>
</div>
<!-- Action Grid -->
<div class="w-full space-y-4">
<!-- Primary CTA -->
<button class="w-full h-14 rounded-xl bg-gradient-to-r from-primary to-primary-container text-white font-outfit font-bold text-base shadow-[0_8px_20px_-4px_rgba(2,21,64,0.3)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Back to Dashboard</span>
<span class="material-symbols-outlined text-xl">dashboard</span>
</button>
<!-- Secondary CTA -->
<button class="w-full h-14 rounded-xl bg-surface-container-highest text-on-primary-fixed-variant font-outfit font-semibold text-base active:scale-95 transition-all flex items-center justify-center gap-2">
<span>View All Visits</span>
<span class="material-symbols-outlined text-xl">calendar_today</span>
</button>
</div>
</main>
<!-- Success Message Toast (Optional subtle feedback) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 glass-effect rounded-full shadow-[0_12px_32px_-8px_rgba(5,25,67,0.1)] flex items-center gap-3 border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary text-lg" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
<span class="font-label text-xs font-semibold text-on-surface/80 tracking-wide uppercase">Cloud sync complete</span>
</div>
