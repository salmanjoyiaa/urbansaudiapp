      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .ghost-border {
        border: 1px solid rgba(197, 198, 208, 0.15);
      }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface font-body text-on-surface selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Subtle Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md space-y-12 relative z-10">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 bg-primary flex items-center justify-center rounded-xl mb-2 shadow-xl shadow-primary/10">
<span class="material-symbols-outlined text-surface text-3xl" data-icon="concierge_bell" style="">doorbell</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary" style="">
                    UrbanRealEstateSaudi</h1>
<p class="text-on-surface-variant font-body text-sm tracking-wide max-w-[280px] leading-relaxed" style="">
                    Exclusively curated for seamless management of your premium property portfolio.
                </p>
</div>
<!-- Login Card / Tonal Container -->
<div class="bg-surface-container-lowest glass-effect p-8 md:p-10 rounded-[2rem] ghost-border shadow-[0_24px_48px_rgba(5,25,67,0.04)]">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant px-1" for="email" style="">
                            Email Address
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface font-body text-sm focus:ring-2 focus:ring-secondary/20 transition-all duration-200 placeholder:text-outline/40" id="email" name="email" placeholder="name@luxury-estate.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-[11px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant" for="password" style="">
                                Password
                            </label>
<a class="font-label text-[10px] font-bold text-secondary uppercase tracking-widest hover:text-primary transition-colors" href="#" style="">
                                Forgot?
                            </a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface font-body text-sm focus:ring-2 focus:ring-secondary/20 transition-all duration-200 placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-surface font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-200 text-sm tracking-wide" type="submit" style="">
                            Sign In to Dashboard
                        </button>
</div>
</form>
<!-- Footer Links Inside Card -->
<div class="mt-8 flex items-center justify-center space-x-2">
<span class="text-on-surface-variant text-xs" style="">New to the platform?</span>
<a class="text-secondary text-xs font-bold hover:underline" href="#" style="">Request Access</a>
</div>
</div>
<!-- Global Footer Info -->
<div class="flex flex-col items-center space-y-6">
<div class="flex items-center space-x-6">
<div class="flex items-center space-x-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="">lock</span>
<span class="text-[10px] font-label font-medium uppercase tracking-widest" style="">End-to-End Encrypted</span>
</div>
<div class="flex items-center space-x-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-sm" data-icon="verified_user" style="">verified_user</span>
<span class="text-[10px] font-label font-medium uppercase tracking-widest" style="">Authorized Access</span>
</div>
</div>
<p class="text-[10px] text-on-surface-variant/40 font-label tracking-widest text-center" style="">
                    © 2024 THE DIGITAL CONCIERGE. ALL RIGHTS RESERVED.
                </p>
</div>
</div>
</main>
<!-- Decorative Image for Context (Luxury Interior) - Hidden on smaller screens for focus -->

</div>
